### CONTROLS

## Graphical/Gnome interface approved to be present
rhel9stig_gui_approved: false

# If gui not installed
rhel9stig_gui: "{{ prelim_gnome_present.stat.exists | default(false) }}"

## SSHD
rhel9stig_sshd_required: true
rhel9stig_sshd_config_file: /etc/ssh/sshd_config

rhel9stig_sshd_config_banner_file: /etc/issue
rhel9stig_sshd_config_ciphers: "{{ rhel9stig_dod_ciphers }}"
rhel9stig_sshd_config_clientalivecountmax: 1
rhel9stig_sshd_config_clientaliveinterval: 600  # max 600
rhel9stig_sshd_config_compress: 'no'
rhel9stig_sshd_config_gssapiauth: 'no'
rhel9stig_sshd_config_hostauth: 'no'
rhel9stig_sshd_config_ignoreknownhosts: 'yes'
rhel9stig_sshd_config_ignorerhosts: 'yes'
rhel9stig_sshd_config_include_conf: /etc/ssh/sshd_config.d/*.conf
rhel9stig_sshd_config_kerbauth: 'no'
rhel9stig_sshd_config_lastlog: 'yes'
rhel9stig_sshd_config_loglevel: VERBOSE
rhel9stig_sshd_config_macs: "{{ rhel9stig_dod_macs }}"
rhel9stig_sshd_config_maxlogins: 10
rhel9stig_sshd_config_pubkeyauth: 'yes'
rhel9stig_sshd_config_permitroot: 'no'
rhel9stig_sshd_config_privsep: sandbox
rhel9stig_sshd_config_rekeylimit: '1G 1h'
rhel9stig_sshd_config_strictmodes: 'yes'
rhel9stig_sshd_config_userenv: 'no'
rhel9stig_sshd_config_x11forward: 'no'
rhel9stig_sshd_config_x11uselocal: 'yes'

## Bootloader/Grub settings
rhel9stig_grub_superuser: root
rhel9stig_bootloader_password_hash: 'grub.pbkdf2.sha512.changethispassword'  # pragma: allowlist secret
rhel9stig_set_bootloader_password: false # pragma: allowlist secret

## Banner
rhel9stig_workaround_for_disa_benchmark: true

rhel9stig_logon_banner: "{{ rhel9stig_workaround_for_disa_benchmark | ternary(
        rhel9stig_logon_banner_nice | regex_replace('(?s)(?<!\\n)\\n(?!(\n|$))', ' '),
        rhel9stig_logon_banner_nice) }}"
rhel9stig_logon_banner_nice: |
    You are accessing a U.S. Government (USG) Information System (IS) that is
    provided for USG-authorized use only.

    By using this IS (which includes any device attached to this IS), you consent
    to the following conditions:

    -The USG routinely intercepts and monitors communications on this IS for
    purposes including, but not limited to, penetration testing, COMSEC monitoring,
    network operations and defense, personnel misconduct (PM), law enforcement
    (LE), and counterintelligence (CI) investigations.

    -At any time, the USG may inspect and seize data stored on this IS.

    -Communications using, or data stored on, this IS are not private, are subject
    to routine monitoring, interception, and search, and may be disclosed or used
    for any USG-authorized purpose.

    -This IS includes security measures (e.g., authentication and access controls)
    to protect USG interests--not for your personal benefit or privacy.

    -Notwithstanding the above, using this IS does not constitute consent to PM, LE
    or CI investigative searching or monitoring of the content of privileged
    communications, or work product, related to personal representation or services
    by attorneys, psychotherapists, or clergy, and their assistants. Such
    communications and work product are private and confidential. See User
    Agreement for details.

# Packages and services
rhel9stig_is_ftp_server: false
rhel9stig_is_tftp_server: false
rhel9stig_sendmail_required: false
# NFS - this affects controls RHEL-09-215025 and RHEL-09-215045 as gssproxy is a dependency of nfs-utils.
# If nfs-utils is required then RHEL-09-215045 for gssproxy will be skipped and the controls will be met.
rhel9stig_nfs_utils_required: false
rhel9stig_ypserv_required: false
rhel9stig_rsh_server_required: false
rhel9stig_telnet_server_required: false
rhel9stig_gssproxy_required: false
rhel9stig_iprutils_required: false
rhel9stig_tuned_required: false
rhel9stig_quagga_required: false

## 215xxx
# 215035 - EPEL repository required
# If not required then the package will be removed
# if required then the repository will be disabled
rhel9stig_epel_required: false

# Add list of additional crypto subpolicies to be added to FIPS
rhel9stig_additional_fips_crypto_subpolicies: false
rhel9stig_additional_fips_crypto_subpolicies_list:
# - AD-SUPPORT
# - NO-ENFORCE-EMS

## 23xxxx
rhel9stig_home_filesystem: '/home'

## 25xxxx
# 252040 - DNS processing mode in Network Manager - Must be one of the following: default, none, systemd-resolved
# default: NetworkManager will update /etc/resolv.conf to reflect the nameservers provided by currently active connections.
# none: NetworkManager will not modify /etc/resolv.conf. Used when DNS is managed manually or by another service.
# systemd-resolved: Uses systemd-resolved to manage DNS.
rhel9stig_dns_processing_mode: 'none'

## Firewalld
# rhel9stig_custom_firewall_zone is the desired name for the firewall zone
rhel9stig_custom_firewall:
  zone: "drop"
  interface: "{{ ansible_default_ipv4.interface }}"

# rhel9stig_white_list_services is the services that you want to allow through initially for the new firewall zone
# http and ssh need to be enabled for the role to run.
# This can also be a port number if no service exists
rhel9stig_white_list_services:
  - ssh

## Interface list allowed to have promiscuous mode set
rhel9stig_promisc_if:
  - none

# Set sysctl files
# Sysctl file
rhel9stig_sysctl_file_default: /etc/sysctl.d/99-sysctl.conf
rhel9stig_sysctl_file:
  fs: "{{ rhel9stig_sysctl_file_default }}"
  kernel: "{{ rhel9stig_sysctl_file_default }}"
  network: "{{ rhel9stig_sysctl_file_default }}"
  user: "{{ rhel9stig_sysctl_file_default }}"

## Chrony
rhel9stig_time_synchronization_servers:
  - '0.us.pool.ntp.mil'
  - '1.us.pool.ntp.mil'
rhel9stig_chrony_server_options: "iburst maxpoll 16"  # Max Setting is maxpoll 16

## fapolicy
# Allow adding of fapolicy rules to be updated - also needs rhel9stig_disruption_high
rhel9stig_allow_fapolicy_updates: false

# rhel9stig_fapolicy_white_list is the whitelist for fapolicyd
rhel9stig_fapolicy_white_list:
  - '# Allow Ansible'
  - "allow perm=any trust=1 : dir={{ ansible_env.PWD }}/.ansible/"
  - 'allow perm=any trust=1 : dir=/root/.ansible/'
  - 'allow perm=any trust=1 : dir=/tmp/ansible/'

## DNS
# Please adjust accordingly for ipv4 or ipv6
rhel9stig_dns_ip4_servers:
  - 8.8.8.8
  - 8.8.4.4

# rhel9stig_dns_ip6_servers:
#   - '2001:4860:4860::8888'
#   - '2001:4860:4860::8844'

## Optional settings Please adjust accordingly for your environment
# rhel9stig_resolv_domains:
#   - example.com
# rhel9stig_resolv_search_options: example.com example1.com
# rhel9stig_resolv_dns_options: 'timeout:2 rotate'

## Mail Settings
rhel9stig_postfix_client_conf: permit_mynetworks,reject

### ACCOUNTS and AUTH ###
## PAM and password settings
rhel9stig_pass_max_days: 60
rhel9stig_pass_min_days: 1
rhel9stig_pass_minlen: '15'

rhel9stig_user_inactive_days: '35'  # 35 or less is compliant

# Path to set for users initialization files e.g. echo $PATH expected results
rhel9stig_env_path: '$PATH:$HOME/.local/bin:$HOME/bin'

# Authselect profile settings
rhel9stig_authselect_custom_profile: minimal
# If Set to false will use authselect - Can cause disruption to authentication
rhel9stig_add_faillock_without_authselect: true

# Faillock settings
rhel9stig_faillock_deny: '3'  # 3 or less but not 0
rhel9stig_faillock_fail_interval: '900'  # 900 or less is required not '0'
rhel9stig_faillock_unlock_time: 0  # should be set to 0 unless documented
rhel9stig_faillock_dir: '/var/log/faillock'

rhel9stig_unnecessary_accounts:
  - ftp
  - games
rhel9stig_remove_unnecessary_user_files: false

rhel9stig_login_defs_fail_delay: '4'

rhel9stig_logind_conf_stopsessionidle: '600'

rhel9stig_pam_retry: '3'  # must be set between 1-3, anything else is a failure
rhel9stig_pam_rounds: '5000'

rhel9stig_pwquality_dcredit: -1
rhel9stig_pwquality_dictcheck: 1
rhel9stig_pwquality_difok: 8
rhel9stig_pwquality_lcredit: -1
rhel9stig_pwquality_maxclassrepeat: 4
rhel9stig_pwquality_maxrepeat: 3
rhel9stig_pwquality_minclass: 4
rhel9stig_pwquality_ocredit: -1
rhel9stig_pwquality_ucredit: -1

rhel9stig_sudoers_exclude_nopasswd_list:
  - ec2-user
  - vagrant

rhel9stig_smartcard_reader: false

### SSSD
rhel9stig_sssd_configure: false
rhel9stig_sssd_config_certmap: |
  [certmap/{{ rhel9stig_sssd.domain }}/{{ rhel9stig_sssd.rulename }}"]
  matchrule ='.*example@mil'
  maprule = (userCertificate;binary={cert!bin})
  domains = example.com

### Rsyslog
# Set the type either rsyslogd or syslog-ng this sets the audit tools binary as referred to controls
# RHEL-09-232035, RHEL-09-232220, RHEL-09-232225
rhel9stig_syslog_binary: rsyslogd
# Set the following to true if the server accepts incoming syslog data using rsyslog
rhel9stig_rsyslog_server: false

# Adjust to match remote syslog server configuration
# There are two ways to offload
# 1. Legacy way - using @@
# 2. New way - using Rainer scripts
# The new way is more secure and is the preferred method.

# If using legacy offload, set this to true
# If using Rainer scripts offload, set this to false
rhel9stig_rsyslog_legacy_offload: false

# Standard settings for remote syslog server
# Server IP address
rhel9stig_rsyslog_remote_server_ip: 10.10.10.10
# Server port
rhel9stig_rsyslog_remote_server_port: 9999
# Server protocol
rhel9stig_rsyslog_remote_server_protocol: '@@'

# Stream driver settings for rainerscripts offload
# Stream driver type
rhel9stig_rsyslog_stream_driver: 'gtls'
# Stream driver mode
rhel9stig_rsyslog_stream_driver_mode: '1'
# Stream driver authentication mode
rhel9stig_rsyslog_stream_driver_auth_mode: 'x509/name'
# Stream driver permitted peers
rhel9stig_rsyslog_stream_driver_permitted_peers: 'central.example.net'

### Aide
# AIDE is a file integrity checking tool, similar in nature to Tripwire.
# While it cannot prevent intrusions, it can detect unauthorized changes
# to configuration files by alerting when the files are changed. Review
# the AIDE quick start guide and AIDE documentation before proceeding.
# By setting this variable to `true`, all of the settings related to AIDE will be applied!
rhel9stig_use_aide: true

# If DB file older than below will automatically rebuild DB
# e.g. options:1w = 1 week, 1d = 1day 1h = 1 hour
rhel9stig_aide_db_file_age: 1w

# If aide already setup this forces a new DB to be created despite age
rhel9stig_aide_db_recreate: false

# New db file
rhel9stig_aide_db_new_file: /var/lib/aide/aide.db.new.gz
# Active db file
rhel9stig_aide_db_file: /var/lib/aide/aide.db.gz

rhel9stig_aide_cron_file: /etc/cron.daily/aide  # NOTE the path may change if not running daily
rhel9stig_aide_cron_day: '*'
rhel9stig_aide_cron_hour: '4'
rhel9stig_aide_cron_minute: '30'
rhel9stig_aide_cron_job: '/usr/sbin/aide --check | /bin/mail -s "$HOSTNAME - Daily aide integrity check run" root@sysname.mil'
rhel9stig_aide_cron_name: 'Aide Job runs Daily at 0430'

### AUDITD
# Ensure this matches the filesystem where the audit logs are stored.
# It will affect checks for control RHEL-09-653030
rhel9stig_auditd_required: true
rhel9stig_audit_log_filesystem: '/var/log/audit'
rhel9stig_audit_conf_action_mail_acct: root
rhel9stig_audit_conf_admin_space_left: 5%
rhel9stig_audit_conf_admin_space_left_action: single
rhel9stig_audit_conf_disk_error_action: HALT  # Can be one of "SYSLOG", "SINGLE", or "HALT"
rhel9stig_audit_conf_disk_full_action: HALT  # Can be one of "SYSLOG", "SINGLE", or "HALT"
rhel9stig_audit_conf_freq: '100'
rhel9stig_audit_conf_local_events: 'yes'
rhel9stig_audit_conf_log_format: ENRICHED
rhel9stig_audit_conf_logfile: "{{ rhel9stig_audit_log_filesystem }}/audit.log"
rhel9stig_audit_conf_logfile_group: root
rhel9stig_audit_conf_max_log_file_action: ROTATE
rhel9stig_audit_conf_name_format: hostname
rhel9stig_audit_conf_overflow_action: syslog
rhel9stig_audit_conf_space_left: 25%
rhel9stig_audit_conf_space_left_action: email
rhel9stig_audit_conf_write_logs: 'yes'
rhel9stig_audit_backlog_limit: 8192
# Audit binaries
rhel9stig_audit_bins:
  - '/usr/sbin/auditctl'
  - '/usr/sbin/aureport'
  - '/usr/sbin/ausearch'
  - '/usr/sbin/autrace'
  - '/usr/sbin/auditd'
  - '/usr/sbin/{{ rhel9stig_syslog_binary }}'  # Note you may not need this is container
  - '/usr/sbin/augenrules'
