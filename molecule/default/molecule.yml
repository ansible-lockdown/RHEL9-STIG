---
dependency:
  name: galaxy
  options:
    requirements-file: collections/requirements.yml
driver:
  name: docker
platforms:
  - name: rhel9-stig-qa
    image: rockylinux/rockylinux:9-ubi-init
    platform: linux/arm64
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    capabilities:
      - SYS_ADMIN
provisioner:
  name: ansible
  log: true
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer
  inventory:
    host_vars:
      rhel9-stig-qa:
        ansible_become: false
        setup_audit: true
        run_audit: true
        audit_git_version: benchmark_v2r7
        skip_reboot: true
        system_is_container: true
        rhel9stig_disruption_high: false
verifier:
  name: ansible
