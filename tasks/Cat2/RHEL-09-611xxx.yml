    - RHEL-09-611080
    - CAT2
    - CCI-000198
    - SRG-OS-000075-GPOS-00043
    - SV-258105r1015105_rule
    - V-258105
    - NIST800-53R4_IA-5
  vars:
    warn_control_id: "MEDIUM | RHEL-09-611080"
  block:
    - name: "MEDIUM | RHEL-09-611080 | AUDIT | RHEL 9 passwords must have a 24 hours minimum password lifetime restriction in /etc/shadow. | Capture accts"
      ansible.builtin.command: "awk -F: '$4 < 1 {print $1}' /etc/shadow"
      changed_when: false
      failed_when: discovered_24hr_passwd_restrict.rc not in [ 0, 1 ]
      register: discovered_24hr_passwd_restrict

    - name: "MEDIUM | RHEL-09-611080 | WARN | RHEL 9 passwords must have a 24 hours minimum password lifetime restriction in /etc/shadow. | Warning"
      when:
        - discovered_24hr_passwd_restrict.stdout | length > 0
        - not rhel9stig_disruption_high
      ansible.builtin.debug:
        msg: "Warning!! Accounts have been found to have an incorrect password lifetime"

    - name: "MEDIUM | RHEL-09-611080 | WARN | RHEL 9 passwords must have a 24 hours minimum password lifetime restriction in /etc/shadow. | Warning"
      when:
        - discovered_24hr_passwd_restrict.stdout | length > 0
        - not rhel9stig_disruption_high
      ansible.builtin.import_tasks:
        file: warning_facts.yml

    - name: "MEDIUM | RHEL-09-611080 | WARN | RHEL 9 passwords must have a 24 hours minimum password lifetime restriction in /etc/shadow. | Amend accounts"
      when:
        - discovered_24hr_passwd_restrict.stdout | length > 0
        - rhel9stig_disruption_high
        - item in rhel9stig_interactive_users
      ansible.builtin.command: "passwd -n 1 {{ item }}"
      changed_when: true
      loop: "{{ discovered_24hr_passwd_restrict.stdout_lines }}"

- name: "MEDIUM | RHEL-09-611085 | PATCH | RHEL 9 must require users to provide a password for privilege escalation"
  when:
    - rhel_09_611085
    - rhel9stig_disruption_high
  tags:
    - RHEL-09-611085
    - CAT2
    - CCI-002038
    - SRG-OS-000373-GPOS-00156
    - SRG-OS-000373-GPOS-00157
    - SRG-OS-000373-GPOS-00158
    - SV-258106r1050789_rule
    - V-258106
    - NIST800-53R4_IA-11
  vars:
    warn_control_id: "MEDIUM | RHEL-09-611085"
  block:
    - name: "MEDIUM | RHEL-09-611085 | AUDIT | RHEL 9 must require users to provide a password for privilege escalation"
      ansible.builtin.shell: grep -Ei '(nopasswd)' /etc/sudoers /etc/sudoers.d/* | cut -d':' -f1
      changed_when: false
      failed_when: discovered_sudoers_nopasswd.rc not in [ 0, 1 ]
      register: discovered_sudoers_nopasswd

    - name: "MEDIUM | RHEL-09-611085 | PATCH | RHEL 9 must require users to provide a password for privilege escalation"
      when:
        - discovered_sudoers_nopasswd.stdout | length > 0
        - not rhel9stig_disruption_high
      ansible.builtin.debug:
        msg: "Warning!! You have sudo commands that require NO Password Please Investigate"

    - name: "MEDIUM | RHEL-09-611085 | PATCH | RHEL 9 must require users to provide a password for privilege escalation"
      when:
        - discovered_sudoers_nopasswd | length > 0
        - not rhel9stig_disruption_high
      ansible.builtin.import_tasks:
        file: warning_facts.yml

    - name: "MEDIUM | RHEL-09-611085 | PATCH | RHEL 9 must require users to provide a password for privilege escalation"
      when:
        - discovered_sudoers_nopasswd.stdout | length > 0
        - rhel9stig_disruption_high
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '^((?!#|{% for name in rhel9stig_sudoers_exclude_nopasswd_list %}{{ name }}{% if not loop.last -%}|{%- endif -%}{% endfor %}).*)NOPASSWD(.*)'
        replace: '\1PASSWD\2'
        validate: '/usr/sbin/visudo -cf %s'
      loop: "{{ discovered_sudoers_nopasswd.stdout_lines }}"

