---

- name: Systemd_daemon_reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remount_home
  ansible.posix.mount:
    name: /home
    state: remounted

- name: Remount_tmp
  ansible.posix.mount:
    name: /tmp
    state: remounted

- name: Remount_var
  ansible.posix.mount:
    name: /var
    state: remounted

- name: Remount_var_log
  ansible.posix.mount:
    name: /var/log
    state: remounted

- name: Remount_var_log_audit
  ansible.posix.mount:
    name: /var/log/audit
    state: remounted

- name: Remount_var_tmp
  ansible.posix.mount:
    name: /var/tmp
    state: remounted

- name: Reload_sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Rebuild_grub
  ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
  changed_when: true

- name: Firewalld_reload
  ansible.builtin.command: firewall-cmd --reload
  changed_when: true

- name: Restart_NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    state: restarted

- name: Restart_ssh
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Restart_sssd
  ansible.builtin.systemd:
    name: sssd
    state: restarted

- name: Update_aliases
  ansible.builtin.command: newaliases
  changed_when: true

- name: Update_dconf
  ansible.builtin.command: dconf update
  changed_when: true

#  "Build aide DB"

- name: "Build aide db | Check current db file"
  ansible.builtin.stat:
    path: "{{ rhel9stig_aide_db_file }}"
  register: discovered_aide_db_file
  listen: Build aide db

- name: "Build aide db | Check current db file age"
  when: discovered_aide_db_file.stat.exists
  ansible.builtin.find:
    path: "{{ rhel9stig_aide_db_file | dirname }}"
    pattern: "{{ rhel9stig_aide_db_file | basename }}"
    age: "{{ rhel9stig_aide_db_file_age }}"
  register: discovered_aide_db_age
  listen: Build aide db

- name: "Build aide db | Build AIDE DB if older than {{ rhel9stig_aide_db_file_age }}"  # noqa name[title]
  when:
    - not ansible_check_mode
    - not discovered_aide_db_file.stat.exists or
      (discovered_aide_db_age.files | length > 0) or
      rhel9stig_aide_db_recreate
  ansible.builtin.command: "{{ aide_initiate_command }}"
  changed_when: true
  listen: Build aide db

- name: "Build aide db | Build AIDE DB | Wait for file before continuing"
  when:
    - not ansible_check_mode
    - not discovered_aide_db_file.stat.exists or
      (discovered_aide_db_age.files | length > 0) or
      rhel9stig_aide_db_recreate
  ansible.builtin.wait_for:
    path: /var/lib/aide/aide.db.new.gz
  listen: Build aide db

- name: "Build aide db | Build AIDE DB | copy AIDE DB"
  when:
    - not ansible_check_mode
    - not discovered_aide_db_file.stat.exists or
      (discovered_aide_db_age.files | length > 0) or
      rhel9stig_aide_db_recreate
  ansible.builtin.copy:
    src: /var/lib/aide/aide.db.new.gz
    dest: /var/lib/aide/aide.db.gz
    remote_src: true
    mode: 'ug-wx,o-rwx'
  listen: Build aide db

- name: Restart_rsyslog
  ansible.builtin.systemd:
    name: rsyslog.service
    state: restarted

# Must be prior to fapolicyd restart
- name: Generate fapolicyd rules
  ansible.builtin.command: fagenrules --load
  changed_when: true

- name: Restart fapolicyd
  ansible.builtin.service:
    name: fapolicyd
    state: restarted

## Auditd tasks note order for handlers to run

- name: Auditd_immutable_check
  ansible.builtin.command: grep -c "^-e 2" /etc/audit/rules.d/audit.rules
  changed_when: false
  failed_when: discovered_auditd_immutable_check.rc not in [ 0, 1 ]
  register: discovered_auditd_immutable_check

- name: Audit_immutable_fact
  when: discovered_auditd_immutable_check.stdout == '1'
  notify: change_requires_reboot
  ansible.builtin.debug:
    msg: "Reboot required for auditd to apply new rules as immutable set"

- name: Change_requires_reboot
  ansible.builtin.set_fact:
    change_requires_reboot: true

- name: Stop auditd process
  ansible.builtin.command: systemctl kill auditd
  changed_when: true
  listen: Restart_auditd

- name: Start auditd process
  ansible.builtin.systemd_service:
    name: auditd
    state: started
  listen: Restart_auditd
