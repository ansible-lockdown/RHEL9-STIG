---

- name: Systemd_daemon_reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remount_home
  ansible.posix.mount:
    name: /home
    state: remounted

- name: Remount_tmp
  ansible.posix.mount:
    name: /tmp
    state: remounted

- name: Remount_var
  ansible.posix.mount:
    name: /var
    state: remounted

- name: Remount_var_log
  ansible.posix.mount:
    name: /var/log
    state: remounted

- name: Remount_var_log_audit
  ansible.posix.mount:
    name: /var/log/audit
    state: remounted

- name: Remount_var_tmp
  ansible.posix.mount:
    name: /var/tmp
    state: remounted

- name: Reload_sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Rebuild_grub
  ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
  changed_when: true

- name: Firewalld_reload
  ansible.builtin.command: firewall-cmd --reload
  changed_when: true

- name: Restart_NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    state: restarted

- name: Restart_sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: ReInstall crypto policies
  ansible.builtin.command: dnf -y reinstall crypto-policies
  changed_when: true
  listen: Reinstall_crypto_policies

- name: Set crypto policies
  ansible.builtin.command: "update-crypto-policies --set {{ combined_crypto_policy_config }}"
  changed_when: true
  notify: Change_requires_reboot
  listen: Reinstall_crypto_policies

- name: "Get authselect faillock state"
  when: not rhel9stig_add_faillock_without_authselect
  ansible.builtin.command: authselect current | grep failock
  changed_when: false
  register: discovered_authselect_faillock_state
  listen: Authselect_enable_faillock

- name: "Set authselect faillock state"
  when:
    - not rhel9stig_add_faillock_without_authselect
    - "'with-faillock' not in discovered_authselect_faillock_state.stdout"
  ansible.builtin.command: authselect enable-feature with-faillock
  changed_when: true
  listen: Authselect_enable_faillock

- name: Restart_sssd
  ansible.builtin.systemd:
    name: sssd
    state: restarted

- name: Restart_pcscd
  ansible.builtin.systemd:
    name: pcscd
    state: restarted

- name: Update_aliases
  ansible.builtin.command: newaliases
  changed_when: true

- name: Update_dconf
  ansible.builtin.command: dconf update
  changed_when: true

#  "Build aide DB"

- name: "Build aide db | Check current db file"
  ansible.builtin.stat:
    path: "{{ rhel9stig_aide_db_file }}"
  register: discovered_aide_db_file
  listen: Build aide db

- name: "Build aide db | Check current db file age"
  when: discovered_aide_db_file.stat.exists
  ansible.builtin.find:
    path: "{{ rhel9stig_aide_db_file | dirname }}"
    pattern: "{{ rhel9stig_aide_db_file | basename }}"
    age: "{{ rhel9stig_aide_db_file_age }}"
  register: discovered_aide_db_age
  listen: Build aide db

- name: "Build aide db | Build AIDE DB if older than {{ rhel9stig_aide_db_file_age }}"  # noqa name[title]
  when:
    - not ansible_check_mode
    - not discovered_aide_db_file.stat.exists or
      (discovered_aide_db_age.files | length > 0) or
      rhel9stig_aide_db_recreate
  ansible.builtin.command: "{{ aide_initiate_command }}"
  changed_when: true
  listen: Build aide db

- name: "Build aide db | Build AIDE DB | Wait for file before continuing"
  when:
    - not ansible_check_mode
    - not discovered_aide_db_file.stat.exists or
      (discovered_aide_db_age.files | length > 0) or
      rhel9stig_aide_db_recreate
  ansible.builtin.wait_for:
    path: /var/lib/aide/aide.db.new.gz
  listen: Build aide db

- name: "Build aide db | Build AIDE DB | copy AIDE DB"
  when:
    - not ansible_check_mode
    - not discovered_aide_db_file.stat.exists or
      (discovered_aide_db_age.files | length > 0) or
      rhel9stig_aide_db_recreate
  ansible.builtin.copy:
    src: /var/lib/aide/aide.db.new.gz
    dest: /var/lib/aide/aide.db.gz
    remote_src: true
    mode: 'ug-wx,o-rwx'
  listen: Build aide db

- name: Restart_rsyslog
  ansible.builtin.systemd:
    name: rsyslog.service
    state: restarted

# Must be prior to fapolicyd restart

- name: Fapolicy set to non-permissive
  ansible.builtin.replace:
    path: /etc/fapolicyd/fapolicyd.conf
    regexp: ^permissive\s*=\s*1
    replace: permissive = 0
  listen: Restart fapolicyd

- name: Generate fapolicyd rules
  ansible.builtin.command: fagenrules --load
  changed_when: true
  listen: Restart fapolicyd

- name: Restart fapolicyd
  ansible.builtin.service:
    name: fapolicyd
    state: restarted
  listen: Restart fapolicyd

## Auditd tasks note order for handlers to run

- name: Auditd uid immutable check
  ansible.builtin.command: grep -ci immutable /etc/audit/audit.rules
  changed_when: false
  failed_when: discovered_auditd_uid_immutable_check.rc not in [ 0, 1 ]
  register: discovered_auditd_uid_immutable_check
  listen: auditd_checks

- name: Auditd unauthorized check
  ansible.builtin.command: grep -c "^-e 2" /etc/audit/rules.d/audit.rules
  changed_when: false
  failed_when: discovered_auditd_unauth_immutable_check.rc not in [ 0, 1 ]
  register: discovered_auditd_unauth_immutable_check
  listen: auditd_checks

- name: Set auditd restart or reboot required
  when:
    - discovered_auditd_uid_immutable_check == '0'
    - discovered_auditd_unauth_immutable_check.stdout == '0'
  ansible.builtin.command: augenrules --load
  changed_when: true
  listen: auditd_checks

- name: Set auditd restart or reboot required
  when: discovered_auditd_uid_immutable_check == '1' or
        discovered_auditd_unauth_immutable_check.stdout == '1'
  notify:
    - Restart_auditd
    - Change_requires_reboot
  ansible.builtin.debug:
    msg: "Reboot required for auditd to apply new rules as immutable set"
  listen: auditd_checks

- name: Stop auditd process
  ansible.builtin.command: systemctl kill auditd
  changed_when: true
  listen: Restart_auditd

- name: Start auditd process
  ansible.builtin.systemd_service:
    name: auditd
    state: started
  listen: Restart_auditd

- name: Change_requires_reboot
  ansible.builtin.set_fact:
    change_requires_reboot: true
